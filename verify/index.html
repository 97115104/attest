<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>verify attestation - attest</title>
  <meta name="description" content="Verify an AI content attestation">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="window">
  <div class="title-bar">
    <span>verify - attestation verification</span>
  </div>
  <div class="window-body">

    <!-- Verification result (populated by JS) -->
    <div id="result"></div>

    <!-- Manual input fallback -->
    <div id="manual-input">
      <h2>▸ Paste attestation data</h2>
      <p class="muted">Enter a base64-encoded attestation or full JSON:</p>
      <textarea id="data-input" rows="6" style="width:100%; font-family:var(--font-mono); font-size:12px; padding:6px; border:2px inset var(--motif-surface);"></textarea>
      <div class="btn-row">
        <button class="btn" onclick="verifyInput()">verify</button>
      </div>
    </div>

    <div class="status-bar" id="status">ready</div>
  </div>
</div>

<!-- ═══ CDE Front Panel ═══ -->
<div class="panel">
  <div class="workspace-switcher">
    <a href="/" class="ws-btn">home</a>
    <a href="/developers/" class="ws-btn">docs</a>
    <a href="/verify/" class="ws-btn active">verify</a>
    <a href="https://github.com/97115104/attest" target="_blank" class="ws-btn">source</a>
  </div>
  <div class="panel-launchers">
    <input type="color" id="bg-picker" class="panel-color" title="Desktop color" />
  </div>
  <div class="panel-clock" id="clock"></div>
</div>

<script>
function decodeAttestation(raw) {
  // Try base64 first
  try {
    const decoded = atob(raw);
    return JSON.parse(decoded);
  } catch {}
  // Try URL-decoded base64
  try {
    const decoded = atob(decodeURIComponent(raw));
    return JSON.parse(decoded);
  } catch {}
  // Try raw JSON
  try {
    return JSON.parse(raw);
  } catch {}
  return null;
}

function typeIcon(t) {
  if (t === 'human') return '<svg width="24" height="24" viewBox="0 0 14 14"><circle cx="7" cy="4" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M1 13c0-3 2.5-5 6-5s6 2 6 5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>';
  if (t === 'ai') return '<svg width="24" height="24" viewBox="0 0 14 14"><rect x="3" y="1" width="8" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="5.5" cy="5" r="1" fill="currentColor"/><circle cx="8.5" cy="5" r="1" fill="currentColor"/><line x1="5" y1="8" x2="9" y2="8" stroke="currentColor" stroke-width="1"/><line x1="5" y1="11" x2="5" y2="13" stroke="currentColor" stroke-width="1.2"/><line x1="9" y1="11" x2="9" y2="13" stroke="currentColor" stroke-width="1.2"/></svg>';
  return '<svg width="24" height="24" viewBox="0 0 14 14"><circle cx="4" cy="5" r="2.5" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="7.5" y="2.5" width="5" height="5" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M3 9v4M5 9v4M9 9v2M11 9v2" stroke="currentColor" stroke-width="1.2"/></svg>';
}

function typeLabel(t) {
  if (t === 'human') return 'human authored';
  if (t === 'collab') return 'human + AI collaboration';
  if (t === 'ai') return 'AI generated';
  return t || 'unknown';
}

function renderAttestation(att) {
  const type = att.authorship_type || (att.role === 'authored' ? 'human' : att.role === 'generated' ? 'ai' : 'collab');
  const el = document.getElementById('result');
  el.innerHTML = `
    <div class="inset" style="text-align:center; margin-bottom:10px;">
      <div style="margin-bottom:4px;">${typeIcon(type)}</div>
      <h2 style="font-size:16px; margin-bottom:2px;">${typeLabel(type)}</h2>
      <p class="muted" style="margin:0;">attestation verified</p>
    </div>

    <div class="fieldset">
      <div class="fieldset-legend">attestation details</div>
      <table>
        <tr><td><strong>content</strong></td><td>${esc(att.content_name || '-')}</td></tr>
        <tr><td><strong>model</strong></td><td>${esc(att.model || '-')}</td></tr>
        <tr><td><strong>role</strong></td><td>${esc(att.role || '-')}</td></tr>
        <tr><td><strong>type</strong></td><td>${esc(type)}</td></tr>
        <tr><td><strong>author</strong></td><td>${esc(att.author || '-')}</td></tr>
        <tr><td><strong>timestamp</strong></td><td>${esc(att.timestamp || '-')}</td></tr>
        <tr><td><strong>platform</strong></td><td>${esc(att.platform || '-')}</td></tr>
        <tr><td><strong>version</strong></td><td>${esc(att.version || '-')}</td></tr>
        <tr><td><strong>id</strong></td><td><code>${esc(att.id || '-')}</code></td></tr>
        ${att.content_hash ? `<tr><td><strong>hash</strong></td><td><code style="word-break:break-all;">${esc(att.content_hash)}</code></td></tr>` : ''}
        ${att.document_type ? `<tr><td><strong>doc type</strong></td><td>${esc(att.document_type)}</td></tr>` : ''}
      </table>
    </div>

    ${att.signature ? `
    <div class="fieldset">
      <div class="fieldset-legend">signature</div>
      <table>
        <tr><td><strong>algorithm</strong></td><td>${esc(att.signature.algorithm || att.signature.type || '-')}</td></tr>
        <tr><td><strong>value</strong></td><td><code style="word-break:break-all; font-size:11px;">${esc(att.signature.value || '-')}</code></td></tr>
        ${att.signer ? `<tr><td><strong>signer</strong></td><td>${esc(att.signer.name || att.signer.id || '-')}</td></tr>` : ''}
      </table>
    </div>` : ''}

    <h3>raw JSON</h3>
    <pre><code>${esc(JSON.stringify(att, null, 2))}</code></pre>
  `;
  document.getElementById('status').textContent = 'verification complete';
  document.getElementById('manual-input').style.display = 'none';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function verifyInput() {
  const raw = document.getElementById('data-input').value.trim();
  if (!raw) return;
  const att = decodeAttestation(raw);
  if (!att) {
    document.getElementById('status').textContent = 'error: could not decode attestation data';
    return;
  }
  renderAttestation(att);
}

// Auto-decode from URL params
const params = new URLSearchParams(window.location.search);
const dataParam = params.get('data');
if (dataParam) {
  const att = decodeAttestation(dataParam);
  if (att) {
    renderAttestation(att);
  } else {
    document.getElementById('status').textContent = 'error: invalid attestation data in URL';
  }
}

// Clock
function tick() {
  const d = new Date();
  document.getElementById('clock').textContent =
    d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}
tick();
setInterval(tick, 30000);

const picker = document.getElementById('bg-picker');
const saved = localStorage.getItem('attest-bg');
if (saved) document.body.style.background = saved;
picker.value = saved || getComputedStyle(document.body).backgroundColor.includes('rgb') ?
  '#' + getComputedStyle(document.body).backgroundColor.match(/\d+/g).map(x=>(+x).toString(16).padStart(2,'0')).join('') :
  '#2e5064';
picker.addEventListener('input', e => {
  document.body.style.background = e.target.value;
  localStorage.setItem('attest-bg', e.target.value);
});
</script>
</body>
</html>
