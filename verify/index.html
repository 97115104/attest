<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>verify // attest</title>
  <meta name="description" content="Verify an AI content attestation">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles/style.css">
</head>
<body>

<div class="shell">
  <nav>
    <a href="/" class="logo">attest</a>
    <div class="nav-links">
      <a href="/">dashboard</a>
      <a href="/agents/">agents</a>
      <a href="/humans/">humans</a>
      <a href="/verify/" class="active">verify</a>
    </div>
  </nav>

  <h1>verify attestation</h1>

  <!-- Verification result -->
  <div id="result"></div>

  <!-- Manual input -->
  <div id="manual-input">
    <div class="section">
      <div class="section-header">paste attestation data</div>
      <div class="section-body">
        <p class="dim" style="font-size: 13px;">Enter a base64-encoded attestation or raw JSON.</p>
        <div class="field">
          <textarea id="data-input" rows="6" style="resize:vertical;"></textarea>
        </div>
        <div class="btn-row">
          <button class="btn" onclick="verifyInput()">verify</button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span>attest v2.0 · MIT license · <a href="/s/y52ru5lq">attested</a></span>
    <span>
      <a href="https://github.com/97115104/attest">source</a> ·
      <a href="/llms.txt">llms.txt</a> ·
      <a href="/.well-known/attest.json">api spec</a>
    </span>
  </div>
</div>

<script src="/scripts/field.js"></script>
<script src="/scripts/shared.js"></script>
<script>
function decodeAttestation(raw) {
  try { return JSON.parse(atob(raw)); } catch {}
  try { return JSON.parse(atob(decodeURIComponent(raw))); } catch {}
  try { return JSON.parse(raw); } catch {}
  return null;
}

function renderAttestation(att) {
  const type = att.authorship_type || (att.role === 'authored' ? 'human' : att.role === 'generated' ? 'ai' : 'collab');
  const badgeClass = type === 'human' ? 'badge-human' : type === 'ai' ? 'badge-ai' : 'badge-collab';
  const typeLabels = { human: 'human authored', collab: 'human + AI collaboration', ai: 'AI generated' };
  const el = document.getElementById('result');

  // Track this verification
  fetch('/api/track-verify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ attestation_id: att.id }),
  }).catch(() => {});

  el.innerHTML = `
    <div class="verify-result" style="margin-bottom: 24px;">
      <div class="verdict pass">VERIFIED</div>
      <p class="dim">${esc(typeLabels[type] || type)}</p>
      <span class="badge ${badgeClass}" style="margin-top: 8px; font-size: 13px; padding: 4px 12px;">${esc(type)}</span>
    </div>

    <div class="section" style="margin-bottom: 16px;">
      <div class="section-header">attestation details</div>
      <div class="section-body">
        <table>
          <tr><td class="dim">content</td><td>${esc(att.content_name || '-')}</td></tr>
          <tr><td class="dim">model</td><td>${esc(att.model || '-')}</td></tr>
          ${type !== 'human' ? `<tr><td class="dim">platform</td><td>${esc(att.platform || '-')}</td></tr>` : ''}
          <tr><td class="dim">type</td><td><span class="badge ${badgeClass}">${esc(type)}</span></td></tr>
          <tr><td class="dim">author</td><td>${esc(att.author || '-')}</td></tr>
          <tr><td class="dim">timestamp</td><td>${esc(att.timestamp || '-')}</td></tr>
          <tr><td class="dim">version</td><td>${esc(att.version || '-')}</td></tr>
          <tr><td class="dim">id</td><td><code>${esc(att.id || '-')}</code></td></tr>
          ${att.content_hash ? `<tr><td class="dim">hash</td><td style="word-break:break-all; font-size:11px;"><code>${esc(att.content_hash)}</code></td></tr>` : ''}
          ${att.document_type ? `<tr><td class="dim">doc type</td><td>${esc(att.document_type)}</td></tr>` : ''}
          ${att.source_url ? `<tr><td class="dim">source</td><td><a href="${esc(att.source_url)}" target="_blank">${esc(att.source_url)}</a></td></tr>` : ''}
        </table>
      </div>
    </div>

    ${att.signature ? `
    <div class="section" style="margin-bottom: 16px;">
      <div class="section-header">signature</div>
      <div class="section-body">
        <table>
          <tr><td class="dim">algorithm</td><td>${esc(att.signature.algorithm || att.signature.type || '-')}</td></tr>
          <tr><td class="dim">value</td><td style="word-break:break-all; font-size:11px;"><code>${esc(att.signature.value || '-')}</code></td></tr>
          ${att.signer ? `<tr><td class="dim">signer</td><td>${esc(att.signer.name || '-')} <code>${esc(att.signer.id || '')}</code></td></tr>` : ''}
        </table>
      </div>
    </div>` : ''}

    <div class="section">
      <div class="section-header">raw json</div>
      <div class="section-body">
        <pre><code>${esc(JSON.stringify(att, null, 2))}</code></pre>
      </div>
    </div>
  `;
  document.getElementById('manual-input').style.display = 'none';
}

function renderError(msg) {
  document.getElementById('result').innerHTML = `
    <div class="verify-result fail" style="margin-bottom: 24px;">
      <div class="verdict fail">FAILED</div>
      <p class="dim">${esc(msg)}</p>
    </div>
  `;
}

function verifyInput() {
  const raw = document.getElementById('data-input').value.trim();
  if (!raw) return;
  const att = decodeAttestation(raw);
  if (!att) {
    renderError('could not decode attestation data');
    return;
  }
  renderAttestation(att);
}

// Auto-decode from URL params
const params = new URLSearchParams(window.location.search);
const dataParam = params.get('data');
if (dataParam) {
  const att = decodeAttestation(dataParam);
  if (att) renderAttestation(att);
  else renderError('invalid attestation data in URL');
}
</script>
</body>
</html>
